<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODA MI — Женская одежда и домашний трикотаж</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: #ffffff; color: #111111; line-height: 1.4; }

        .top-bar { background: #000000; color: #ffffff; text-align: center; padding: 9px 15px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        header { background: #ffffff; border-bottom: 1px solid #eeeeee; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1300px; margin: 0 auto; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: #000000; text-decoration: none; text-transform: uppercase; }
        
        .search-box { flex: 1; max-width: 450px; position: relative; }
        .search-box input { width: 100%; padding: 12px 18px; border: 1px solid #e0e0e0; border-radius: 30px; font-size: 13px; outline: none; background: #f9f9f9; transition: 0.2s; }
        .search-box input:focus { border-color: #000000; background: #ffffff; }

        .hero { background: #f5f5f7; padding: 50px 20px; text-align: center; border-bottom: 1px solid #eeeeee; }
        .hero h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; margin-bottom: 10px; }
        .hero p { font-size: 14px; color: #666666; font-weight: 500; letter-spacing: 0.5px; }

        .main-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 13px; color: #666; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .product-card { background: #ffffff; border: 1px solid #f0f0f0; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s ease; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        
        /* Гарантирует, что фото не обрезаются */
        .img-wrapper { width: 100%; height: 380px; background: #fafafa; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .product-img { width: 100%; height: 100%; object-fit: contain; }

        .product-details { padding: 15px; }
        .product-title { font-size: 13px; font-weight: 600; color: #111111; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.3; height: 34px; overflow: hidden; }
        .price-box { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .price-current { font-size: 16px; font-weight: 800; color: #000000; }
        .product-sizes-list { font-size: 11px; color: #888888; font-weight: 500; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #ffffff; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; border-radius: 8px; position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 650px) { .modal-body { grid-template-columns: 1fr; } }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; border: none; background: none; }
        .modal-img { width: 100%; max-height: 420px; border-radius: 4px; object-fit: contain; background: #fafafa; }
        
        .size-chip { padding: 8px 14px; border: 1px solid #111; background: #fff; color: #111; font-weight: 600; font-size: 12px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-buy { background: #0088cc; color: #ffffff; border: none; padding: 15px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; width: 100%; margin-top: 15px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn-buy:hover { opacity: 0.9; }

        footer { background: #111111; color: #ffffff; padding: 40px 20px; margin-top: 60px; text-align: center; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="top-bar">БЕСПЛАТНАЯ ДОСТАВКА ПРИ ЗАКАЗЕ ОТ 3000 ₽ • ОДЕЖДА MODA MI</div>

    <header>
        <div class="header-container">
            <a href="#" class="logo">MODA MI</a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск товара, платья, артикула..." oninput="filterProducts()">
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>КАТАЛОГ ОДЕЖДЫ MODA MI</h1>
        <p>Выбирайте вещи и оформляйте заказы прямо в Telegram</p>
    </section>

    <div class="main-container">
        <div class="controls-bar">
            <span id="itemsCount">Загрузка каталога...</span>
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-body">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <img id="modalImg" class="modal-img" src="" alt="">
            <div>
                <h2 id="modalTitle" style="font-size: 17px; font-weight:700; text-transform:uppercase; margin-bottom: 10px;"></h2>
                <div id="modalPrice" style="font-size: 22px; font-weight:800; margin-bottom: 15px;"></div>
                <div style="margin-bottom: 15px;">
                    <div style="font-size: 11px; font-weight:700; text-transform:uppercase; margin-bottom: 8px;">Выберите размер:</div>
                    <div id="modalSizesContainer" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>
                <div id="modalDesc" style="font-size: 12px; color:#666; line-height: 1.6; max-height: 160px; overflow-y:auto; border-top:1px solid #eee; padding-top:12px; margin-bottom: 15px;"></div>
                <button class="btn-buy" onclick="orderTelegram()">Оформить заказ в Telegram</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 MODA MI — ВСЕ ПРАВА ЗАЩИЩЕНЫ</p>
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRtb81m0dU5sUYXC0w4UZUH7zJmJoJaG2yX1G21Vdi3al3zOtRKh4u8ogInAHqwoc2yr9UA1pZgz-Jk/pub?output=csv';

        let products = [];
        let currentItem = null;
        let selectedSize = '';

        function loadProducts() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    products = [];
                    
                    data.forEach(item => {
                        const status = (item.status || item.Status || '').toString().trim().toLowerCase();
                        if (status === 'скрыть' || status === 'нет в наличии') return;

                        const rawSizes = (item.sizes || item.Sizes || '').toString();
                        const sizeArr = rawSizes ? rawSizes.split(/[,;/]+/).map(s => s.trim()).filter(Boolean) : [];

                        products.push({
                            id: item.id || item.ID || '—',
                            title: item.title || item.Title || 'Без названия',
                            category: item.category || item.Category || '',
                            price: item.price || item.Price || '0',
                            sizes: sizeArr,
                            image: item.image || item.Image || '',
                            description: item.description || item.Description || ''
                        });
                    });

                    renderProducts(products);
                },
                error: function(err) {
                    console.error("Ошибка загрузки CSV:", err);
                    document.getElementById('itemsCount').innerText = "Ошибка загрузки таблицы";
                }
            });
        }

        function renderProducts(items) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            document.getElementById('itemsCount').innerText = `Показано товаров: ${items.length}`;

            if (items.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding: 40px; color:#888;">Товары не найдены или пока отсутствуют в таблице</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="img-wrapper">
                        <img class="product-img" src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x400?text=MODA+MI'">
                    </div>
                    <div class="product-details">
                        <div class="product-title">${item.title}</div>
                        <div class="price-box">
                            <span class="price-current">${item.price} ₽</span>
                        </div>
                        <div class="product-sizes-list">Размеры: ${item.sizes.length ? item.sizes.join(', ') : 'уточняйте'}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(item) {
            currentItem = item;
            selectedSize = item.sizes[0] || '';
            document.getElementById('modalImg').src = item.image;
            document.getElementById('modalTitle').innerText = item.title + ' (АРТ: ' + item.id + ')';
            document.getElementById('modalPrice').innerText = item.price + ' ₽';
            document.getElementById('modalDesc').innerText = item.description;

            const container = document.getElementById('modalSizesContainer');
            container.innerHTML = '';
            
            if (item.sizes && item.sizes.length > 0) {
                item.sizes.forEach((s, idx) => {
                    const chip = document.createElement('button');
                    chip.type = 'button';
                    chip.innerText = s;
                    chip.className = 'size-chip';
                    chip.onclick = () => selectSize(chip, s);
                    if (idx === 0) selectSize(chip, s);
                    container.appendChild(chip);
                });
            } else {
                container.innerHTML = '<span style="font-size:12px; color:#888;">Уточняйте при заказе</span>';
            }

            document.getElementById('modal').style.display = 'flex';
        }

        function selectSize(btn, size) {
            selectedSize = size;
            document.querySelectorAll('.size-chip').forEach(b => {
                b.style.background = '#ffffff';
                b.style.color = '#111111';
            });
            btn.style.background = '#111111';
            btn.style.color = '#ffffff';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function orderTelegram() {
            if (!currentItem) return;
            const sizeStr = selectedSize ? ` (Размер: ${selectedSize})` : '';
            const msg = `Здравствуйте! Хочу заказать в MODA MI: ${currentItem.title} (Артикул: ${currentItem.id})${sizeStr} за ${currentItem.price} ₽`;
            window.open(`https://t.me/shopmoda37?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function filterProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.title.toLowerCase().includes(q) || p.id.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        loadProducts();
    </script>
</body>
</html>
